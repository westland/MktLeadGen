research_task:
  description: >
    Buscar en Reddit, Discord, Hacker News, reseñas de Amazon y discusiones/problemas de GitHub clientes potenciales.
    Centrarse en encontrar publicaciones donde los usuarios mencionen puntos de dolor, soliciten recomendaciones de productos o discutan problemas.
    Extraer el contenido del texto, la plataforma, el autor y la URL del hilo.
  expected_output: "Una lista detallada de prospectos sin procesar que contiene el cuerpo de las publicaciones/comentarios, los usuarios autores, las URLs y las plataformas."
  agent: lead_researcher

analyze_task:
  description: >
    Analizar el texto de cada publicación/comentario para identificar candidatos calificados.
    Extraer:
    - username/author
    - platform (Reddit/Discord/HackerNews/Amazon/GitHub/etc)
    - pain points (describir el problema específico al que se enfrentan)
    - desired_rating (reutilizado como 'desired_outcome' - el objetivo o solución que buscan)
    - class (reutilizado como 'target_category' - categoría de producto, pila de software o tema)
    - lead_score (1-10, donde 10 significa mayor intención de compra o más relevante, y 1 significa irrelevante)
    Conservar únicamente los prospectos con puntuación >= 6.
  expected_output: "Una lista estructurada de prospectos calificados, calificados y categorizados."
  agent: lead_analyzer
  context:
    - research_task

generate_task:
  description: >
    Redactar un mensaje de contacto en frío altamente personalizado y enfocado en el valor para cada prospecto calificado.
    El mensaje debe abordar directamente sus puntos de dolor específicos, hacer referencia a las características del producto y seguir las reglas de escritura.
  expected_output: "Un borrador de mensaje de contacto personalizado para cada prospecto calificado."
  agent: message_generator
  context:
    - analyze_task

save_task:
  description: >
    Deduplicar nuevos prospectos contra las entradas existentes en la base de datos, luego guardar todos los nuevos prospectos calificados (incluyendo las cartas de contacto personalizadas generadas) en el archivo de la base de datos local.
  expected_output: "Confirmación que detalla la cantidad de nuevos prospectos guardados con éxito."
  agent: lead_archiver
  context:
    - analyze_task
    - generate_task
